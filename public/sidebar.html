<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hercules CRM</title>
  <link href="https://integrations.missiveapp.com/missive.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--missive-background-color, #fff);
      color: var(--missive-text-color, #1a1a1a);
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #c8102e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* States */
    .state { display: none; }
    .state.active { display: block; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px 8px;
      color: var(--missive-light-text-color, #888);
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.5;
    }

    /* Customer detected */
    .customer-section {
      flex: 1;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--missive-light-text-color, #888);
      margin-bottom: 8px;
    }

    .customer-card {
      background: var(--missive-conversation-list-background-color, #f5f5f5);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .customer-email {
      font-size: 14px;
      font-weight: 600;
      word-break: break-all;
      margin-bottom: 2px;
    }

    .customer-name {
      font-size: 13px;
      color: var(--missive-light-text-color, #888);
    }

    .email-count {
      font-size: 11px;
      color: var(--missive-light-text-color, #888);
      margin-top: 6px;
    }

    /* CTA button */
    .cta-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      background: #c8102e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .cta-button:hover { background: #a80d25; }
    .cta-button:active { background: #8f0b1f; }

    .cta-button svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Multiple emails */
    .email-list {
      list-style: none;
      margin-bottom: 16px;
    }

    .email-list li {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .email-list li:hover {
      background: var(--missive-conversation-list-background-color, #f5f5f5);
    }

    .email-list li .arrow {
      color: var(--missive-light-text-color, #888);
      font-size: 12px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 32px 8px;
      color: var(--missive-light-text-color, #888);
      font-size: 13px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--missive-conversation-list-background-color, #e0e0e0);
      border-top-color: #c8102e;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">H</div>
    <div class="header-title">Hercules CRM</div>
  </div>

  <!-- State: Loading -->
  <div id="state-loading" class="state">
    <div class="loading">
      <div class="spinner"></div>
      <p>Detecting customer...</p>
    </div>
  </div>

  <!-- State: No conversation selected -->
  <div id="state-empty" class="state active">
    <div class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
      </svg>
      <p>Select a conversation to detect customer email</p>
    </div>
  </div>

  <!-- State: Single customer detected -->
  <div id="state-customer" class="state">
    <div class="customer-section">
      <div class="label">Customer detected</div>
      <div class="customer-card">
        <div class="customer-email" id="customer-email"></div>
        <div class="customer-name" id="customer-name"></div>
      </div>
      <button class="cta-button" id="open-crm-btn">
        Open Hercules CRM
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
        </svg>
      </button>
    </div>
  </div>

  <!-- State: Multiple external emails found -->
  <div id="state-multiple" class="state">
    <div class="customer-section">
      <div class="label">Select a customer</div>
      <ul class="email-list" id="email-list"></ul>
    </div>
  </div>

  <script src="https://integrations.missiveapp.com/missive.js"></script>
  <script>
    // --- Configuration ---
    // Same Pages project — just use the origin
    const DASHBOARD_URL = location.origin;

    // --- State management ---
    let currentEmail = null;
    let currentName = null;

    function showState(stateId) {
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      document.getElementById(stateId).classList.add('active');
    }

    function openDashboard(email) {
      const url = DASHBOARD_URL + '?email=' + encodeURIComponent(email);
      Missive.openURL(url);
    }

    // --- Filter out team/internal emails ---
    function isExternalEmail(address) {
      if (!address) return false;
      const internal = [
        '@hercules-merchandise.com',
        '@hercules-merchandise.de',
        '@hercules-merchandise.co.uk',
        '@hercules-merchandising.fr',
        '@missiveapp.com',
      ];
      const lower = address.toLowerCase();
      return !internal.some(domain => lower.endsWith(domain));
    }

    // --- Extract unique external contacts from conversations ---
    function extractExternalContacts(conversations) {
      const addressFields = Missive.getEmailAddresses(conversations);
      const seen = new Set();
      const contacts = [];

      for (const field of addressFields) {
        if (!field.address) continue;
        const email = field.address.toLowerCase();
        if (seen.has(email) || !isExternalEmail(email)) continue;
        seen.add(email);
        contacts.push({
          email: email,
          name: field.name || '',
        });
      }

      return contacts;
    }

    // --- Handle conversation change ---
    function handleConversations(conversations) {
      if (!conversations || conversations.length === 0) {
        showState('state-empty');
        return;
      }

      const contacts = extractExternalContacts(conversations);

      if (contacts.length === 0) {
        showState('state-empty');
        return;
      }

      if (contacts.length === 1) {
        // Single customer detected
        currentEmail = contacts[0].email;
        currentName = contacts[0].name;

        document.getElementById('customer-email').textContent = currentEmail;
        document.getElementById('customer-name').textContent = currentName || '';
        document.getElementById('customer-name').style.display = currentName ? 'block' : 'none';

        showState('state-customer');
      } else {
        // Multiple external emails — let the user pick
        const list = document.getElementById('email-list');
        list.innerHTML = '';

        for (const contact of contacts) {
          const li = document.createElement('li');
          li.innerHTML =
            '<span>' + escapeHtml(contact.name ? contact.name + ' &lt;' + contact.email + '&gt;' : contact.email) + '</span>' +
            '<span class="arrow">&rsaquo;</span>';
          li.addEventListener('click', function () {
            openDashboard(contact.email);
          });
          list.appendChild(li);
        }

        showState('state-multiple');
      }
    }

    // --- Utility ---
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Button handler ---
    document.getElementById('open-crm-btn').addEventListener('click', function () {
      if (currentEmail) {
        openDashboard(currentEmail);
      }
    });

    // --- Listen for conversation changes ---
    Missive.on('change:conversations', function (ids) {
      if (!ids || ids.length === 0) {
        showState('state-empty');
        return;
      }

      showState('state-loading');

      Missive.fetchConversations(ids).then(function (conversations) {
        handleConversations(conversations);
      });
    }, { retroactive: true });
  </script>
</body>
</html>
